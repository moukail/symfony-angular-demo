apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: my-template
labels:
  app: symfony-angular-demo
objects:
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: database
    spec:
      selector:
        matchLabels:
          app: database
      template:
        metadata:
          labels:
            app: database
        spec:
          replicas: 3
          containers:
            - name: database
              image: docker.io/library/mysql:9.7-oraclelinux9
              ports:
                - containerPort: 3306
              volumeMounts:
                - name: data
                  mountPath: /var/lib/mysql
              env:
                - name: MYSQL_ROOT_PASSWORD
                  value: ${MYSQL_ROOT_PASSWORD}
                - name: MYSQL_DATABASE
                  value: ${MYSQL_DATABASE}
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: database-pvc
      volumeClaimTemplates:
        - metadata:
            name: database-pvc
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 1Gi

  - apiVersion: apps/v1
    kind: Deployment 
    metadata:
      name: backend 
    spec:
      selector:
        matchLabels: 
          app: backend
      template:
        metadata:
          labels:
            app: backend
        spec:
          replicas: 3
          containers: 
            - name: backend 
              image: docker.io/moukail/symfony-angular-demo-backend:latest
              ports:
                - containerPort: 80
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "128m"
                limits:
                  memory: "256Mi"
                  cpu: "256m"
              env:
                - name: DATABASE_URL
                  value: "mysql://${MYSQL_ROOT_USER}:${MYSQL_ROOT_PASSWORD}@database:3306/${MYSQL_DATABASE}"
  
  - apiVersion: apps/v1
    kind: Deployment 
    metadata:
      name: frontend 
    spec:
      selector:
        matchLabels: 
          app: frontend
      template:
        metadata:
          labels:
            app: frontend
        spec:
          replicas: 3
          containers: 
            - name: frontend 
              image: docker.io/moukail/symfony-angular-demo-frontend:latest
              ports:
                - containerPort: 80    

  - apiVersion: v1
    kind: Service
    metadata:
      name: frontend
    spec:
      selector:
        app: frontend
      ports:
        - protocol: TCP
          port: 80
          targetPort: 80

parameters:
  - name: MYSQL_DATABASE
    required: true
  - name: MYSQL_ROOT_USER
    required: true
    value: root 
  - name: MYSQL_ROOT_PASSWORD
    required: true