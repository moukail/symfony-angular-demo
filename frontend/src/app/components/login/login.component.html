<div class="login-wrapper">
  
  <mat-card class="login-card" elevation="4">
    
    <mat-card-header>
      <mat-card-title>Login</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <div *ngIf="error$ | async as error" class="auth-error-banner" data-testid="error-banner">
        <mat-icon>error</mat-icon>
        <span>{{ error }}</span>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        
        <mat-form-field appearance="outline" color="primary">
          <mat-label>Email Address</mat-label>
          <input matInput formControlName="email" type="email" placeholder="name@example.com">
          <mat-icon matPrefix>email</mat-icon>
          
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Please enter a valid email address
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" color="primary">
          <mat-label>Password</mat-label>
          <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
          <mat-icon matPrefix>lock</mat-icon>
          
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button" aria-label="Toggle password visibility">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>

          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Password must be at least 6 characters
          </mat-error>
        </mat-form-field>

        <div class="form-actions">
          <button mat-flat-button color="primary" type="submit" class="submit-button">
            Sign In
          </button>
        </div>

      </form>
    </mat-card-content>

    <!--<mat-card-actions class="card-footer">
      <button mat-button color="accent" type="button">
        Forgot Password?
      </button>
      <button mat-button type="button">
        Create Account
      </button>
    </mat-card-actions>-->

  </mat-card>

</div>
