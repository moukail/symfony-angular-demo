<div class="layout-container">
  
  <mat-toolbar color="primary" class="navbar">
    <span>My Application</span>
    <span class="spacer"></span>
    <button routerLink="/home" mat-button>Home</button>

    @if (!(isActive$ | async)) {
      <button routerLink="/login" mat-button>Login</button>
    }

    @if (isActive$ | async) {
      @if ((role$ | async) === 'ROLE_ADMIN') {
        <button routerLink="/dashboard" mat-button>Dashboard</button>
        <button routerLink="/users" mat-button>Users</button>
      }
      <button (click)="logout()" mat-button>Logout</button>
    }
  </mat-toolbar>

  <main class="main-content">
    <div class="content-padding">
      <router-outlet></router-outlet>
    </div>
  </main>

  <mat-toolbar color="accent" class="footer">
    <span class="footer-text">&copy; 2026 My Company. All rights reserved.</span>
  </mat-toolbar>

</div>
