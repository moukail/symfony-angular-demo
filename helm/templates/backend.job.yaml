apiVersion: batch/v1
kind: Job
metadata:
  name: database-migrations
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: database-migrations
          image: {{ .Values.backend.image }}
          command: [ "php", "bin/console", "doctrine:migrations:migrate", "--no-interaction"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: database-url